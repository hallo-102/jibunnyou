x-backend-environment: &backend-environment
  KEIBA_APP_NAME: ${KEIBA_APP_NAME:-Keiba AI Studio}
  KEIBA_APP_VERSION: ${KEIBA_APP_VERSION:-1.0.0}
  KEIBA_ENVIRONMENT: ${KEIBA_ENVIRONMENT:-local}
  KEIBA_GIT_COMMIT: ${KEIBA_GIT_COMMIT:-unknown}
  KEIBA_DATABASE_URL: ${KEIBA_DATABASE_URL:?KEIBA_DATABASE_URL must be set in .env}
  KEIBA_REDIS_URL: ${KEIBA_REDIS_URL:-redis://redis:6379/0}
  KEIBA_DATA_ROOT: ${KEIBA_DATA_ROOT:-/workspace/data}
  KEIBA_EXCEL_INPUT_DIR: ${KEIBA_EXCEL_INPUT_DIR:-/workspace/data/raw/excel}
  KEIBA_ODDS_INPUT_DIR: ${KEIBA_ODDS_INPUT_DIR:-/workspace/data/raw/odds}
  KEIBA_LEGACY_OUTPUT_DIR: ${KEIBA_LEGACY_OUTPUT_DIR:-/workspace/data/raw/legacy_output}
  KEIBA_RAW_SNAPSHOTS_DIR: ${KEIBA_RAW_SNAPSHOTS_DIR:-/workspace/data/raw_snapshots}
  KEIBA_NORMALIZED_DIR: ${KEIBA_NORMALIZED_DIR:-/workspace/data/normalized}
  KEIBA_SNAPSHOTS_DIR: ${KEIBA_SNAPSHOTS_DIR:-/workspace/data/snapshots}
  KEIBA_STAGING_DIR: ${KEIBA_STAGING_DIR:-/workspace/data/staging}
  KEIBA_EXPORTS_DIR: ${KEIBA_EXPORTS_DIR:-/workspace/data/exports}
  KEIBA_LOGS_DIR: ${KEIBA_LOGS_DIR:-/workspace/data/logs}
  KEIBA_LEGACY_ROOT: ${KEIBA_LEGACY_ROOT:-/workspace/legacy}
  KEIBA_LEGACY_RUNNER_MODE: ${KEIBA_LEGACY_RUNNER_MODE:-dry_run}
  KEIBA_LEGACY_TIMEOUT_SECONDS: ${KEIBA_LEGACY_TIMEOUT_SECONDS:-900}
  KEIBA_PREDICTION_RUNNER_MODE: ${KEIBA_PREDICTION_RUNNER_MODE:-dry_run}
  KEIBA_PREDICTION_TIMEOUT_SECONDS: ${KEIBA_PREDICTION_TIMEOUT_SECONDS:-1800}
  KEIBA_AI_PROVIDER: ${KEIBA_AI_PROVIDER:-openai}
  KEIBA_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  KEIBA_AI_MODEL: ${KEIBA_AI_MODEL:-gpt-5.4-mini-2026-03-17}
  KEIBA_AI_REASONING_EFFORT: ${KEIBA_AI_REASONING_EFFORT:-low}
  KEIBA_AI_TIMEOUT_SECONDS: ${KEIBA_AI_TIMEOUT_SECONDS:-120}
  KEIBA_AI_MAX_OUTPUT_TOKENS: ${KEIBA_AI_MAX_OUTPUT_TOKENS:-8000}
  KEIBA_AI_MAX_RETRIES: ${KEIBA_AI_MAX_RETRIES:-2}
  KEIBA_AI_RETRY_DELAYS_SECONDS: ${KEIBA_AI_RETRY_DELAYS_SECONDS:-[2,10]}
  KEIBA_COLLECTOR_MAX_RETRIES: ${KEIBA_COLLECTOR_MAX_RETRIES:-3}
  KEIBA_COLLECTOR_RETRY_DELAYS_SECONDS: ${KEIBA_COLLECTOR_RETRY_DELAYS_SECONDS:-[10,60,300]}
  KEIBA_COLLECTOR_MIN_INTERVAL_SECONDS: ${KEIBA_COLLECTOR_MIN_INTERVAL_SECONDS:-60}
  KEIBA_JOB_EXECUTION_MODE: ${KEIBA_JOB_EXECUTION_MODE:-queue}
  KEIBA_ODDS_FRESHNESS_WARNING_MINUTES: ${KEIBA_ODDS_FRESHNESS_WARNING_MINUTES:-30}
  KEIBA_ODDS_FRESHNESS_CRITICAL_MINUTES: ${KEIBA_ODDS_FRESHNESS_CRITICAL_MINUTES:-120}
  KEIBA_COLLECTOR_APPROVED_SOURCES: ${KEIBA_COLLECTOR_APPROVED_SOURCES:-[]}
  KEIBA_CORS_ORIGINS: ${KEIBA_CORS_ORIGINS:-["http://localhost:18080","http://127.0.0.1:18080"]}

x-backend-volumes: &backend-volumes
  - ./data/input:/workspace/data/raw/excel:ro
  - ./data/ozzu_csv:/workspace/data/raw/odds:ro
  - ./data/output:/workspace/data/raw/legacy_output:ro
  - ./data/master:/workspace/data/master:ro
  - ./data/raw_snapshots:/workspace/data/raw_snapshots
  - ./data/normalized:/workspace/data/normalized
  - ./data/snapshots:/workspace/data/snapshots
  - ./data/exports:/workspace/data/exports
  - ./data/staging:/workspace/data/staging
  - ./data/logs:/workspace/data/logs
  - ./etc_py:/workspace/legacy/etc_py:ro
  - ./yosou_py:/workspace/legacy/yosou_py:ro
  - ./1_keibayosou_best_import_roi_runner.py:/workspace/legacy/1_keibayosou_best_import_roi_runner.py:ro
  - ./1_keibayosou_config.py:/workspace/legacy/1_keibayosou_config.py:ro
  - ./1_keibayosou_course_style.py:/workspace/legacy/1_keibayosou_course_style.py:ro
  - ./1_keibayosou_features.py:/workspace/legacy/1_keibayosou_features.py:ro
  - ./1_keibayosou_loaders.py:/workspace/legacy/1_keibayosou_loaders.py:ro
  - ./1_keibayosou_penalties.py:/workspace/legacy/1_keibayosou_penalties.py:ro
  - ./1_keibayosou_pipeline.py:/workspace/legacy/1_keibayosou_pipeline.py:ro
  - ./1_keibayosou_utils.py:/workspace/legacy/1_keibayosou_utils.py:ro

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${KEIBA_POSTGRES_DB:?KEIBA_POSTGRES_DB must be set in .env}
      POSTGRES_USER: ${KEIBA_POSTGRES_USER:?KEIBA_POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${KEIBA_POSTGRES_PASSWORD:?KEIBA_POSTGRES_PASSWORD must be set in .env}
      TZ: Asia/Tokyo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      <<: *backend-environment
      KEIBA_SERVICE_NAME: api
    volumes: *backend-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/ready')\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["celery", "-A", "app.worker:celery_app", "worker", "--loglevel=INFO", "--concurrency=1", "--queues=default,collector,prediction,ai"]
    environment:
      <<: *backend-environment
      KEIBA_SERVICE_NAME: worker
    volumes: *backend-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["celery", "-A", "app.worker:celery_app", "beat", "--loglevel=INFO", "--schedule=/workspace/beat/celerybeat-schedule"]
    environment:
      <<: *backend-environment
      KEIBA_SERVICE_NAME: beat
    volumes:
      - beat_data:/workspace/beat
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${KEIBA_FRONTEND_API_BASE_URL:-/api}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${KEIBA_APP_PORT:-18080}:80"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  beat_data:
